### jekyll settings

# front matter defaults
defaults:
  # all markdown files
  - scope:
      path: ""
    values:
      layout: default
  # markdown files in /_members
  - scope:
      type: "members"
    values:
      layout: member
  # markdown files in /_posts
  - scope:
      type: "posts"
    values:
      layout: post
  # markdown files in /_projects
  - scope:
      type: "projects"
    values:
      layout: project
  # markdown files in /_science_data
  - scope:
      type: "science_data"
    values:
      layout: default
  # markdown files in /_science_data_topics
  #- scope:
  #    type: "science_data_topics"
  #  values:
  #    layout: default    
  # markdown files in /_education_data
  - scope:
      type: "education_data"
    values:
      layout: project

collections:
  # generate page for each member
  members:
    output: true
  # do not generate page for each external collaborator
  external_collaborators:
    output: false
  # generate page for each post
  posts:
    output: true
  # generate page for each project
  projects:
    output: true
  # generate page for each science and data entry
  science_data:
    output: true  
  # generate page for each science topics and data entry
  #science_data_topics:
  #  output: true    
  # generate page for each education and data entry
  education_data:
    output: true    

# jekyll plugins
plugins:
  - jekyll-spaceship
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed
  - jekyll-last-modified-at

# code block syntax highlighting
highlighter: rouge

# jekyll theme
theme: null

# sass settings
sass:
  sass_dir: _styles

# force jekyll to include certain files/folders
include:
  - _styles
  - _scripts

# force jekyll to exclude certain files/folders
exclude:
  - README.md
  - LICENSE.md
  - CITATION.cff
