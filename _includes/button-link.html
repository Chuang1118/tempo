{%- assign image_url = include.image_url -%}
{%- assign button_text = include.text | default: "Click Here" -%}
{%- assign link = include.link | default: "#" -%}

{%- if image_url -%}
  <a href="{{ link }}" class="button-link">
    <img src="{{ image_url }}" alt="{{ button_text }}" />
    <span>{{ button_text }}</span>
  </a>
{%- else -%}
  <a href="{{ link }}" class="button-link">
    <span>{{ button_text }}</span>
  </a>
{%- endif -%}
